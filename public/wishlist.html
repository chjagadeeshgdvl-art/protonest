<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Wishlist - ProtoNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wishlist-container {
            background: white;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            margin-top: 30px;
        }

        .wishlist-header { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;}
        .wishlist-header h1 { font-weight: 400; font-size: 28px; }

        .wishlist-item { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
        .wishlist-item-img { width: 120px; height: 120px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; color: #ccc;}
        .wishlist-item-info { flex: 1; }
        .wishlist-item-info h3 { font-size: 18px; margin-bottom: 10px; }
        .wishlist-item-info h3 a { color: var(--link-color); text-decoration: none; }
        .wishlist-item-info h3 a:hover { text-decoration: underline; color: #c45500;}

        .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 15px;}
        .price { font-size: 20px; font-weight: bold; color: var(--danger); }
        .price-drop { font-size: 13px; color: var(--success); }

        .actions { display: flex; gap: 15px; }
        .btn-add { background: #FFD814; border: 1px solid #FCD200; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 500;}
        .btn-add:hover { background: #F7CA00; }
        .btn-remove { background: white; border: 1px solid #ccc; padding: 8px 20px; border-radius: 20px; cursor: pointer; color: #111;}
        .btn-remove:hover { background: #f8f8f8; }

    </style>
</head>
<body style="background-color: var(--bg-color);">
    <header>
        <div class="container header-top">
            <a href="index.html" class="logo">Proto<span>Nest</span></a>
            <div class="search-bar">
                <input type="text" placeholder="Search for products...">
                <button type="button">Search</button>
            </div>
            <div class="header-actions">
                <a href="orders.html" style="color: white; margin-right: 20px;">Your Account</a>
                <a href="cart.html" style="color: white; font-weight: bold;">Cart <span class="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="wishlist-container">
            <div class="wishlist-header">
                <h1>Your Lists</h1>
            </div>

            <div class="wishlist-item">
                <div class="wishlist-item-img"><img src="/images/arduino-uno.jpg" alt="Product Image" style="width:100%; height:100%; object-fit:contain;"></div>
                <div class="wishlist-item-info">
                    <h3><a href="#">Raspberry Pi 4 (8GB) Advanced AI Vision Bot</a></h3>
                    <div style="font-size: 13px; color: #ff9900; margin-bottom: 5px;">⭐⭐⭐⭐⭐ 42</div>
                    
                    <div class="price-row">
                        <div class="price">₹12,999.00</div>
                        <div class="price-drop">Price dropped by ₹500 since added</div>
                    </div>

                    <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 15px;">Added on March 15, 2026</div>

                    <div class="actions">
                        <button class="btn-add" onclick="window.location.href='cart.html'">Add to Cart</button>
                        <button class="btn-remove">Remove from list</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer style="background-color: var(--secondary-color); color: white; padding: 40px 0; margin-top: 60px;">
        <div style="text-align: center;">
            <p>&copy; 2026 ProtoNest by JK Labs. All rights reserved.</p>
        </div>
    </footer>

    <!-- WhatsApp Floating Action Button -->
    <a href="https://wa.me/916303228967?text=Hello%20ProtoNest!%20I%20want%20to%20develop%20a%20custom%20idea." target="_blank" class="whatsapp-float">
        <svg viewBox="0 0 32 32" class="wa-icon" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 3C8.82 3 3 8.82 3 16c0 2.29.61 4.43 1.66 6.3L3.15 28.18l6.05-1.55A12.92 12.92 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm0 23.82a10.84 10.84 0 0 1-5.54-1.52l-.4-.24-4.13 1.06 1.09-4.04-.26-.42A10.87 10.87 0 0 1 5.18 16c0-5.96 4.86-10.82 10.82-10.82 5.96 0 10.82 4.86 10.82 10.82 0 5.96-4.86 10.82-10.82 10.82zm5.95-8.03c-.33-.16-1.92-.95-2.22-1.06-.3-.11-.53-.16-.76.16-.22.33-.84 1.06-1.03 1.28-.19.22-.38.25-.71.08-.33-.16-1.37-.51-2.61-1.61-.96-.86-1.61-1.92-1.8-2.25-.19-.33-.02-.51.15-.67.15-.15.33-.38.49-.58.16-.19.22-.33.33-.55.11-.22.05-.41-.03-.58-.08-.16-.76-1.84-1.04-2.52-.27-.66-.54-.57-.76-.58-.22-.01-.46-.01-.71-.01-.25 0-.66.09-1 .44-.33.36-1.28 1.25-1.28 3.05 0 1.8 1.31 3.54 1.49 3.78.19.25 2.58 3.93 6.25 5.51 2.39 1.03 3.32 1.11 4.46 .94 1.3-.2 3.44-1.4 3.93-2.75.49-1.36.49-2.52.34-2.75-.14-.24-.52-.37-.85-.54z" fill="white"/>
        </svg>
        <span class="wa-text">Develop Custom Idea</span>
    </a>

</body>
</html>

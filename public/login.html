<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ProtoNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page { min-height: 100vh; background: linear-gradient(135deg, #232F3E 0%, #131921 100%); display: flex; align-items: center; justify-content: center; padding: 30px 15px; }
        .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 420px; width: 100%; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #FF9900, #FF6600); padding: 30px; text-align: center; }
        .auth-header h1 { color: #fff; margin: 0 0 5px; font-size: 24px; }
        .auth-header p { color: rgba(255,255,255,0.85); margin: 0; font-size: 14px; }
        .auth-body { padding: 30px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; transition: 0.2s; box-sizing: border-box; }
        .form-group input:focus { border-color: #FF9900; outline: none; box-shadow: 0 0 0 3px rgba(255,153,0,0.1); }
        .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #FF9900, #FF6600); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,153,0,0.4); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .link-row { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .link-row a { color: #FF9900; font-weight: 600; text-decoration: none; }
        .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; display: none; }
        .alert-error { background: #fdecea; color: #d32f2f; border: 1px solid #f5c6cb; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .alert.show { display: block; }
        .password-wrapper { position: relative; }
        .password-wrapper .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: #888; background: none; border: none; }
        .logo-link { display: block; text-align: center; margin-bottom: 15px; }
        .logo-link a { color: #FF9900; font-size: 28px; font-weight: 800; text-decoration: none; }
        .logo-link a span { color: #232F3E; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your JK Labs account</p>
            </div>
            <div class="auth-body">
                <div id="alert-box" class="alert"></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="yourname@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Enter your password">
                        <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
                    </div>
                </div>
                <button class="btn-auth" id="btn-login" onclick="loginUser()">Sign In</button>

                <div class="link-row">
                    New to JK Labs? <a href="signup.html">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showAlert(msg, type) {
            const box = document.getElementById('alert-box');
            box.className = `alert alert-${type} show`;
            box.textContent = msg;
            setTimeout(() => box.classList.remove('show'), 5000);
        }

        function togglePw() {
            const input = document.getElementById('login-password');
            const btn = document.querySelector('.toggle-pw');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁' : '🙈';
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.textContent = '⏳ Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                // Save user session
                localStorage.setItem('protonest_user', JSON.stringify(data.user));
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    // Check for stored redirect intent (e.g., coming from checkout gate)
                    const storedRedirect = localStorage.getItem('protonest_redirect_after_login');
                    localStorage.removeItem('protonest_redirect_after_login');
                    const urlRedirect = new URLSearchParams(window.location.search).get('redirect');
                    window.location.href = storedRedirect || urlRedirect || 'index.html';
                }, 800);
            } catch (err) {
                showAlert(err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        // Allow Enter key to submit
        document.getElementById('login-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginUser();
        });

        // If already logged in, honour redirect intent or go home
        if (localStorage.getItem('protonest_user')) {
            const storedRedirect = localStorage.getItem('protonest_redirect_after_login');
            localStorage.removeItem('protonest_redirect_after_login');
            window.location.href = storedRedirect || 'index.html';
        }
    </script>

    <!-- WhatsApp Floating Action Button -->
    <a href="https://wa.me/916303228967?text=Hello%20ProtoNest!%20I%20want%20to%20develop%20a%20custom%20idea." target="_blank" class="whatsapp-float">

        </svg>
        <span class="wa-text">Develop Custom Idea</span>

</body>
</html>

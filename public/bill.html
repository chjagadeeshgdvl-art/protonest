<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - ProtoNest</title>

  <meta name="description" content="Shop Order Confirmed - ProtoNest. Premium assembled prototypes and components engineered at JK Labs. Quick dispatch and cash on delivery available.">
  <link rel="canonical" href="https://protonest.northflank.app/bill.html">
  <meta property="og:title" content="Order Confirmed - ProtoNest">
  <meta property="og:description" content="Shop Order Confirmed - ProtoNest. Premium assembled prototypes and components engineered at JK Labs. Quick dispatch and cash on delivery available.">
  <meta property="og:url" content="https://protonest.northflank.app/bill.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .confirmation-box { background: white; border-radius: 12px; padding: 40px; margin: 40px auto; max-width: 850px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .success-header { text-align: center; margin-bottom: 30px; }
        .check-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #067D62, #0aa17a); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; animation: popIn 0.5s ease; }
        @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .check-icon span { font-size: 40px; color: white; }
        .order-number { font-size: 16px; color: var(--text-secondary); margin: 15px 0; }
        .coins-earned { background: linear-gradient(135deg, #FFFAEC, #fff3d0); border: 1px solid #FCD200; padding: 15px 20px; border-radius: 10px; margin: 25px 0; display: flex; align-items: center; justify-content: center; gap: 15px; font-weight: bold; }
        .order-items-section { margin: 25px 0; }
        .order-items-section h3 { font-size: 16px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .bill-item { display: flex; gap: 15px; padding: 12px 0; border-bottom: 1px solid #f5f5f5; align-items: center; }
        .bill-item:last-child { border-bottom: none; }
        .bill-item-img { width: 60px; height: 60px; background: #f8f8f8; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
        .bill-item-img img { width: 100%; height: 100%; object-fit: contain; }
        .bill-item-info { flex: 1; }
        .bill-item-price { font-weight: bold; font-size: 16px; white-space: nowrap; }
        .delivery-details { background: #f8f8f8; padding: 20px; border-radius: 10px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .delivery-details h3 { margin-bottom: 10px; font-size: 15px; }
        .delivery-details p { font-size: 14px; line-height: 1.6; color: var(--text-secondary); }
        .action-btns { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn-outline { background: transparent; border: 1px solid #ccc; color: #111; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; display: inline-block; text-align: center; text-decoration: none; }
        .btn-outline:hover { background: #f8f8f8; text-decoration: none; color: #111; }
        .bill-total-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .bill-grand-total { display: flex; justify-content: space-between; padding: 12px 0; font-size: 20px; font-weight: bold; color: var(--danger); border-top: 2px solid var(--border-color); margin-top: 8px; }
        .notif-status { background: #e8f5e9; padding: 12px 20px; border-radius: 8px; margin-top: 20px; font-size: 14px; color: #2e7d32; text-align: center; border: 1px solid #c8e6c9; }
    </style>
</head>
<body style="background-color: var(--bg-color);">
    <header>
        <div class="container header-top" style="justify-content: center;">
            <a href="index.html" class="logo">Proto<span>Nest</span></a>
        </div>
    </header>
    <main class="container">
        <div class="confirmation-box" id="confirmation-box">
            <!-- Rendered by JS -->
        </div>
    </main>

    <script src="/js/cart.js"></script>
    <script>
        function renderBill() {
            const orderData = localStorage.getItem('protonest_last_order');
            if (!orderData) {
                document.getElementById('confirmation-box').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <h2>No order found</h2>
                        <p style="color: var(--text-secondary); margin: 15px 0;">It looks like you haven't placed any order yet.</p>
                        <a href="arduino.html" class="btn btn-primary" style="padding: 12px 30px;">Start Shopping</a>
                    </div>
                `;
                return;
            }

            const order = JSON.parse(orderData);
            const c = order.customer;
            const totalItems = order.items.reduce((s, i) => s + i.quantity, 0);

            // Build items HTML
            let itemsHTML = '';
            order.items.forEach(item => {
                itemsHTML += `
                    <div class="bill-item">
                        <div class="bill-item-img"><img src="${item.image}" alt="${item.name}"></div>
                        <div class="bill-item-info">
                            <div style="font-weight: 500; font-size: 14px;">${item.name}</div>
                            <div style="font-size: 12px; color: var(--text-secondary);">Qty: ${item.quantity}</div>
                        </div>
                        <div class="bill-item-price">${formatPrice(item.price * item.quantity)}</div>
                    </div>
                `;
            });

            document.getElementById('confirmation-box').innerHTML = `
                <div class="success-header">
                    <div class="check-icon"><span>✓</span></div>
                    <h1 style="color: var(--success); font-size: 28px; margin-bottom: 5px;">Order Placed Successfully!</h1>
                    <p style="font-size: 16px; color: var(--text-secondary);">Thank you for shopping with ProtoNest</p>
                    <div class="order-number">
                        <strong>Order ID: ${order.id}</strong><br>
                        Placed on ${order.date}
                    </div>
                </div>

                <div class="coins-earned">
                    <span style="font-size: 28px;">⭐</span>
                    <div>
                        <div style="font-size: 16px;">You earned ${order.coins} ElectroCoins!</div>
                        <div style="font-size: 13px; font-weight: normal;">Use them for discounts on your next purchase.</div>
                    </div>
                </div>

                <div class="order-items-section">
                    <h3>📦 Order Items (${totalItems})</h3>
                    ${itemsHTML}
                    <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border-color);">
                        <div class="bill-total-row"><span>Subtotal:</span><span>${formatPrice(order.total)}</span></div>
                        <div class="bill-total-row"><span>Delivery:</span><span style="color: var(--success);">FREE</span></div>
                        <div class="bill-grand-total"><span>Total:</span><span>${formatPrice(order.total)}</span></div>
                    </div>
                </div>

                <div class="delivery-details">
                    <div>
                        <h3>📍 Delivery Address</h3>
                        <p>
                            <strong>${c.name}</strong><br>
                            ${c.address}<br>
                            Phone: ${c.phone}<br>
                            Email: ${c.email}
                        </p>
                    </div>
                    <div>
                        <h3>🚚 Delivery Details</h3>
                        <p>
                            <strong>Estimated Delivery:</strong><br>
                            ${order.estimatedDelivery}<br><br>
                            <strong>Payment Method:</strong><br>
                            ${order.payment} (${formatPrice(order.total)} to be paid)
                        </p>
                    </div>
                </div>

                <div class="notif-status">
                    ✅ Order confirmation has been sent to your WhatsApp & Email automatically.
                </div>

                <div class="action-btns">
                    <a href="index.html" class="btn btn-primary" style="padding: 12px 40px;">Continue Shopping</a>
                    <a href="arduino.html" class="btn-outline">Browse Products</a>
                </div>
            `;
        }

        renderBill();
    </script>

    <!-- WhatsApp Floating Action Button -->
    <a href="https://wa.me/916303228967?text=Hello%20ProtoNest!%20I%20want%20to%20develop%20a%20custom%20idea." target="_blank" class="whatsapp-float">
        <svg viewBox="0 0 32 32" class="wa-icon" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 3C8.82 3 3 8.82 3 16c0 2.29.61 4.43 1.66 6.3L3.15 28.18l6.05-1.55A12.92 12.92 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm0 23.82a10.84 10.84 0 0 1-5.54-1.52l-.4-.24-4.13 1.06 1.09-4.04-.26-.42A10.87 10.87 0 0 1 5.18 16c0-5.96 4.86-10.82 10.82-10.82 5.96 0 10.82 4.86 10.82 10.82 0 5.96-4.86 10.82-10.82 10.82zm5.95-8.03c-.33-.16-1.92-.95-2.22-1.06-.3-.11-.53-.16-.76.16-.22.33-.84 1.06-1.03 1.28-.19.22-.38.25-.71.08-.33-.16-1.37-.51-2.61-1.61-.96-.86-1.61-1.92-1.8-2.25-.19-.33-.02-.51.15-.67.15-.15.33-.38.49-.58.16-.19.22-.33.33-.55.11-.22.05-.41-.03-.58-.08-.16-.76-1.84-1.04-2.52-.27-.66-.54-.57-.76-.58-.22-.01-.46-.01-.71-.01-.25 0-.66.09-1 .44-.33.36-1.28 1.25-1.28 3.05 0 1.8 1.31 3.54 1.49 3.78.19.25 2.58 3.93 6.25 5.51 2.39 1.03 3.32 1.11 4.46 .94 1.3-.2 3.44-1.4 3.93-2.75.49-1.36.49-2.52.34-2.75-.14-.24-.52-.37-.85-.54z" fill="white"/>
        </svg>
        <span class="wa-text">Develop Custom Idea</span>
    </a>

</body>
</html>

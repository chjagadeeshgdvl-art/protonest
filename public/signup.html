<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ProtoNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page { min-height: 100vh; background: linear-gradient(135deg, #232F3E 0%, #131921 100%); display: flex; align-items: center; justify-content: center; padding: 30px 15px; }
        .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #FF9900, #FF6600); padding: 30px; text-align: center; }
        .auth-header h1 { color: #fff; margin: 0 0 5px; font-size: 24px; }
        .auth-header p { color: rgba(255,255,255,0.85); margin: 0; font-size: 14px; }
        .auth-body { padding: 30px; }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .step-dot.active { background: #FF9900; transform: scale(1.3); }
        .step-dot.done { background: #067D62; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; transition: 0.2s; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus { border-color: #FF9900; outline: none; box-shadow: 0 0 0 3px rgba(255,153,0,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-error { color: #d32f2f; font-size: 12px; margin-top: 4px; display: none; }
        .form-error.show { display: block; }
        .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #FF9900, #FF6600); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,153,0,0.4); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary { background: linear-gradient(135deg, #232F3E, #131921); }
        .link-row { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .link-row a { color: #FF9900; font-weight: 600; text-decoration: none; }
        .step { display: none; }
        .step.active { display: block; }
        .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 15px 0; }
        .otp-box { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
        .otp-box label { font-size: 12px; color: #888; font-weight: 500; }
        .otp-box input { width: 100%; padding: 14px; text-align: center; font-size: 20px; letter-spacing: 6px; font-weight: bold; border: 2px solid #ddd; border-radius: 10px; }
        .otp-box input:focus { border-color: #067D62; box-shadow: 0 0 0 3px rgba(6,125,98,0.15); }
        .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; display: none; }
        .alert-error { background: #fdecea; color: #d32f2f; border: 1px solid #f5c6cb; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .alert.show { display: block; }
        .resend-row { text-align: center; margin-top: 12px; font-size: 13px; color: #888; }
        .resend-row a { color: #FF9900; cursor: pointer; text-decoration: underline; }
        .password-wrapper { position: relative; }
        .password-wrapper .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: #888; background: none; border: none; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Your Account</h1>
                <p>Join JK Labs — Electronics at your doorstep</p>
            </div>
            <div class="auth-body">
                <div class="step-indicator">
                    <div class="step-dot active" id="dot-1"></div>
                    <div class="step-dot" id="dot-2"></div>
                    <div class="step-dot" id="dot-3"></div>
                </div>
                <div id="alert-box" class="alert"></div>

                <!-- STEP 1: Personal Details -->
                <div class="step active" id="step-1">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" placeholder="Enter your full name">
                        <div class="form-error" id="err-name"></div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" placeholder="yourname@gmail.com">
                        <div class="form-error" id="err-email"></div>
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="background: #f0f0f0; padding: 12px 10px; border-radius: 8px; font-size: 14px; font-weight:600; color: #333;">+91</span>
                            <input type="tel" id="reg-phone" placeholder="10-digit mobile number" maxlength="10" style="flex:1;">
                        </div>
                        <div class="form-error" id="err-phone"></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="reg-password" placeholder="Min 6 characters">
                            <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)">👁</button>
                        </div>
                        <div class="form-error" id="err-password"></div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="reg-confirm" placeholder="Re-enter password">
                            <button type="button" class="toggle-pw" onclick="togglePw('reg-confirm', this)">👁</button>
                        </div>
                        <div class="form-error" id="err-confirm"></div>
                    </div>
                    <button class="btn-auth" onclick="goToStep2()">Next →</button>
                </div>

                <!-- STEP 2: Delivery Details -->
                <div class="step" id="step-2">
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <input type="text" id="reg-address" placeholder="House No, Street, Area">
                        <div class="form-error" id="err-address"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="reg-city" placeholder="City">
                            <div class="form-error" id="err-city"></div>
                        </div>
                        <div class="form-group">
                            <label>State</label>
                            <select id="reg-state">
                                <option value="">Select State</option>
                                <option>Andhra Pradesh</option><option>Telangana</option>
                                <option>Tamil Nadu</option><option>Karnataka</option>
                                <option>Kerala</option><option>Maharashtra</option>
                                <option>Gujarat</option><option>Rajasthan</option>
                                <option>Uttar Pradesh</option><option>Madhya Pradesh</option>
                                <option>West Bengal</option><option>Bihar</option>
                                <option>Punjab</option><option>Haryana</option>
                                <option>Odisha</option><option>Jharkhand</option>
                                <option>Chhattisgarh</option><option>Assam</option>
                                <option>Delhi</option><option>Goa</option>
                                <option>Other</option>
                            </select>
                            <div class="form-error" id="err-state"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" id="reg-pincode" placeholder="6-digit pincode" maxlength="6">
                        <div class="form-error" id="err-pincode"></div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-auth btn-secondary" onclick="backToStep1()" style="flex: 0.4;">← Back</button>
                        <button class="btn-auth" id="btn-register" onclick="submitRegistration()" style="flex: 0.6;">Create Account</button>
                    </div>
                </div>

                <!-- STEP 3: OTP Verification -->
                <div class="step" id="step-3">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <div style="font-size: 50px; margin-bottom: 10px;">🔐</div>
                        <h3 style="margin: 0 0 5px;">Verify Your Account</h3>
                        <p style="font-size: 13px; color: #888;">We've sent an OTP securely to your WhatsApp. Enter it below.</p>
                    </div>
                    <div class="otp-inputs">
                        <div class="otp-box">
                            <label>📱 WhatsApp OTP</label>
                            <input type="text" id="otp-phone" maxlength="6" placeholder="------">
                        </div>
                    </div>
                    <button class="btn-auth" id="btn-verify" onclick="verifyOtps()" style="background: linear-gradient(135deg, #067D62, #0aa17a);">✓ Verify & Activate Account</button>
                    <div class="resend-row">
                        Didn't receive? <a onclick="resendOtps()">Resend OTPs</a>
                    </div>
                </div>

                <div class="link-row">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pendingEmail = '';

        function showAlert(msg, type) {
            const box = document.getElementById('alert-box');
            box.className = `alert alert-${type} show`;
            box.textContent = msg;
            setTimeout(() => box.classList.remove('show'), 5000);
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg; el.classList.add('show');
        }
        function clearErrors() {
            document.querySelectorAll('.form-error').forEach(e => { e.textContent = ''; e.classList.remove('show'); });
        }

        function togglePw(inputId, btn) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁' : '🙈';
        }

        function setStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${n}`).classList.add('active');
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = 'step-dot' + (i === n ? ' active' : (i < n ? ' done' : ''));
            }
        }

        function goToStep2() {
            clearErrors();
            let valid = true;
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const pw = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (name.length < 2) { showError('err-name', 'Name is too short'); valid = false; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('err-email', 'Enter a valid email'); valid = false; }
            if (!/^[6-9]\d{9}$/.test(phone)) { showError('err-phone', 'Enter a valid 10-digit mobile number'); valid = false; }
            if (pw.length < 6) { showError('err-password', 'Minimum 6 characters'); valid = false; }
            if (pw !== confirm) { showError('err-confirm', 'Passwords do not match'); valid = false; }
            if (valid) setStep(2);
        }

        function backToStep1() { setStep(1); }

        async function submitRegistration() {
            clearErrors();
            let valid = true;
            const address = document.getElementById('reg-address').value.trim();
            const city = document.getElementById('reg-city').value.trim();
            const state = document.getElementById('reg-state').value;
            const pincode = document.getElementById('reg-pincode').value.trim();

            if (address.length < 5) { showError('err-address', 'Enter a valid address'); valid = false; }
            if (city.length < 2) { showError('err-city', 'Enter a valid city'); valid = false; }
            if (!state) { showError('err-state', 'Select your state'); valid = false; }
            if (!/^\d{6}$/.test(pincode)) { showError('err-pincode', 'Enter a valid 6-digit pincode'); valid = false; }
            if (!valid) return;

            const btn = document.getElementById('btn-register');
            btn.disabled = true;
            btn.textContent = '⏳ Sending OTPs...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('reg-name').value.trim(),
                        email: document.getElementById('reg-email').value.trim(),
                        phone: document.getElementById('reg-phone').value.trim(),
                        password: document.getElementById('reg-password').value,
                        address, city, state, pincode
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                pendingEmail = data.email;
                showAlert('OTP sent successfully! Check your WhatsApp.', 'success');
                setStep(3);
            } catch (err) {
                showAlert(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        async function verifyOtps() {
            const phoneOtp = document.getElementById('otp-phone').value.trim();
            if (phoneOtp.length !== 6) {
                showAlert('Enter the 6-digit WhatsApp OTP.', 'error');
                return;
            }

            const btn = document.getElementById('btn-verify');
            btn.disabled = true;
            btn.textContent = '⏳ Verifying...';

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, phoneOtp })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                // Save user session
                localStorage.setItem('protonest_user', JSON.stringify(data.user));
                showAlert('Account verified! Welcome to ProtoNest. Redirecting...', 'success');
                setTimeout(() => {
                    const storedRedirect = localStorage.getItem('protonest_redirect_after_login');
                    localStorage.removeItem('protonest_redirect_after_login');
                    window.location.href = storedRedirect || 'index.html';
                }, 1200);
            } catch (err) {
                showAlert(err.message, 'error');
                btn.disabled = false;
                btn.textContent = '✓ Verify & Activate Account';
            }
        }

        async function resendOtps() {
            try {
                const res = await fetch('/api/auth/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showAlert('OTP resent! Check your WhatsApp.', 'success');
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        // If already logged in, honour redirect intent or go home
        if (localStorage.getItem('protonest_user')) {
            const storedRedirect = localStorage.getItem('protonest_redirect_after_login');
            localStorage.removeItem('protonest_redirect_after_login');
            window.location.href = storedRedirect || 'index.html';
        }
    </script>

    <!-- WhatsApp Floating Action Button -->
    <a href="https://wa.me/916303228967?text=Hello%20ProtoNest!%20I%20want%20to%20develop%20a%20custom%20idea." target="_blank" class="whatsapp-float">
        <svg viewBox="0 0 32 32" class="wa-icon" xmlns="http://www.w3.org/2000/svg">

        </svg>
        <span class="wa-text">Develop Custom Idea</span>
    </a>

</body>
</html>
